<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Bixuco — Criar conta</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >
    <link
        rel="stylesheet"
        href="/css/criarcontag.css"
    >
</head>

<body>
    <main>

        <!-- lado esquerdo -->
        <section>
            <div>
                <!-- Logo branca -->
                <img
                    src="/img/Logo_Branca.png"
                    alt="Logo Bixuco"
                >

                <!-- titulo -->
                <h1>
                    Crie sua conta
                </h1>

                <!-- texto -->
                <p>
                    Pais e terapeutas juntos pelo
                    bem-estar da criança.
                </p>

            </div>

            <div>
                <img
                    src="/img/familia-bixuco.png"
                    alt="Família utilizando o Bixuco"
                >
            </div>

        </section>

        <!-- lado direito-->

        <section>
            <header>

                <h2>
                    Criar conta
                </h2>

            </header>

            <div>
                <div class="cadastro-progresso">

                    <span class="ativo"></span>
                    <span class="ativo"></span>
                    <span></span>
                </div>

                <h3>
                    Informações sobre você
                </h3>

                <form
                    action="/continuar-cadastro-pai"
                    method="POST"
                    onsubmit="return validarCadastro()"
                >
                    <!-- Nome -->
                    <div class="cadastro-form__grupo">
                        <label
                            for="nome"
                        >
                            Nome completo
                        </label>
                        <input
                            type="text"
                            id="nome"
                            name="nome"
                            placeholder="Digite seu nome completo"
                            autocomplete="name"
                            required
                        >
                        <span
                            class="cadastro-form__erro"
                            id="erro-nome"
                        >
                        </span>
                    </div>

                    <!-- Email -->
                    <div class="cadastro-form__grupo">
                        <label
                            for="email"
                        >
                            Email
                        </label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Digite seu e-mail"
                            autocomplete="email"
                            required
                        >
                        <span
                            class="cadastro-form__erro"
                            id="erro-email"
                        >
                        </span>
                    </div>

                    <!-- Linha com telefone e data -->
                    <div>
                        <!-- Telefone -->
                        <div>

                            <label
                                for="telefone"
                            >
                                Telefone (opcional)
                            </label>
                            <input
                                type="tel"
                                id="telefone"
                                name="telefone"
                                placeholder="(00) 00000-0000"
                                autocomplete="tel"
                            >
                            <span
                                id="erro-telefone"
                            >
                            </span>
                        </div>

                        <!-- Data de nascimento -->
                        <div>
                            <label
                                for="dataNascimento"
                            >
                                Data de nascimento
                            </label>
                            <input
                                type="date"
                                id="dataNascimento"
                                name="dataNascimento"
                                required
                            >
                            <span
                                id="erro-dataNascimento"
                            >
                            </span>
                        </div>
                    </div>

                    <!-- CPF -->
                    <div>

                        <label
                            for="cpf"
                        >
                            CPF
                        </label>

                        <input
                            type="text"
                            id="cpf"
                            name="cpfUser"
                            placeholder="000.000.000-00"
                            maxlength="14"
                            inputmode="numeric"
                            oninput="mascaraCPF(this)"
                            required
                        >
                        <span
                            id="erro-cpf"
                        >
                        </span>
                    </div>

                    <!-- Botão -->
                    <button
                        type="submit"
                        href="/CriarContaSenha"
                    >
                        Continuar
                    </button>
                </form>

                <!-- Termos -->
                <p >
                    Ao criar sua conta você concorda com nossos
                    <a href="/termos">
                        Termos de uso
                    </a>
                    e
                    <a href="/privacidade">
                        Política de privacidade.
                    </a>
                </p>
            </div>
        </section>

    </main>
    <script>

        // mascara do CPF
        function mascaraCPF(input){

            let valor = input.value.replace(/\D/g, "").slice(0,11);

            if(valor.length > 9){
                valor = valor.replace(
                    /(\d{3})(\d{3})(\d{3})(\d{0,2})/,
                    "$1.$2.$3-$4"
                );
            }
            else if(valor.length > 6){
                valor = valor.replace(
                    /(\d{3})(\d{3})(\d{0,3})/,
                    "$1.$2.$3"
                );
            }
            else if(valor.length > 3){
                valor = valor.replace(
                    /(\d{3})(\d{0,3})/,
                    "$1.$2"
                );
            }

            input.value = valor;

        }

        // mascara do telefone
        document.getElementById("telefone").addEventListener("input", function(){

            let valor = this.value.replace(/\D/g,"").slice(0,11);

            if(valor.length > 10){
                valor = valor.replace(
                    /(\d{2})(\d{5})(\d{4})/,
                    "($1) $2-$3"
                );
            }
            else if(valor.length > 6){
                valor = valor.replace(
                    /(\d{2})(\d{4})(\d+)/,
                    "($1) $2-$3"
                );
            }
            else if(valor.length > 2){
                valor = valor.replace(
                    /(\d{2})(\d+)/,
                    "($1) $2"
                );
            }

            this.value = valor;

        });

        // mostra erro
        function mostrarErro(inputId,erroId,mensagem){

            const input = document.getElementById(inputId);
            const erro = document.getElementById(erroId);

            input.classList.add("input-erro");
            erro.textContent = mensagem;
            erro.style.display = "block";

            setTimeout(()=>{
                input.classList.remove("input-erro");
            },500);

        }

        // limpa erros
        function limparErros(){

            [
                "nome",
                "email",
                "telefone",
                "dataNascimento",
                "cpf"
            ].forEach(id=>{

                const campo = document.getElementById(id);
                const erro = document.getElementById("erro-"+id);

                if(campo){
                    campo.classList.remove("input-erro");
                }

                if(erro){
                    erro.style.display = "none";
                    erro.textContent = "";
                }

            });

        }

        // verifica se possui 18 anos
        function maiorIdade(data){

            const hoje = new Date();
            const nascimento = new Date(data);

            let idade = hoje.getFullYear() - nascimento.getFullYear();

            const mes = hoje.getMonth() - nascimento.getMonth();

            if(
                mes < 0 ||
                (mes === 0 && hoje.getDate() < nascimento.getDate())
            ){
                idade--;
            }

            return idade >= 18;

        }

        // valida formulario
        function validarCadastro(){

            limparErros();

            let valido = true;

            const nome = document.getElementById("nome").value.trim();
            const email = document.getElementById("email").value.trim();
            const telefone = document.getElementById("telefone").value.trim();
            const data = document.getElementById("dataNascimento").value;
            const cpf = document.getElementById("cpf").value.replace(/\D/g,"");

            const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if(nome.split(" ").filter(p=>p).length < 2){

                mostrarErro(
                    "nome",
                    "erro-nome",
                    "Digite seu nome completo."
                );

                valido = false;

            }

            if(!regexEmail.test(email)){

                mostrarErro(
                    "email",
                    "erro-email",
                    "Digite um e-mail válido."
                );

                valido = false;

            }

            if(
                telefone &&
                telefone.replace(/\D/g,"").length < 10
            ){

                mostrarErro(
                    "telefone",
                    "erro-telefone",
                    "Telefone inválido."
                );

                valido = false;

            }

            if(!data){

                mostrarErro(
                    "dataNascimento",
                    "erro-dataNascimento",
                    "Informe sua data de nascimento."
                );

                valido = false;

            }
            else if(!maiorIdade(data)){

                mostrarErro(
                    "dataNascimento",
                    "erro-dataNascimento",
                    "Você precisa ter pelo menos 18 anos."
                );

                valido = false;

            }

            if(cpf.length != 11){

                mostrarErro(
                    "cpf",
                    "erro-cpf",
                    "CPF inválido."
                );

                valido = false;

            }

            return valido;

        }

        // mensagens vindas do servidor

        const mensagensServidor = {

            "cpf-invalido":{
                campo:"cpf",
                msg:"CPF inválido."
            },

            "email-invalido":{
                campo:"email",
                msg:"Email inválido."
            },

            "ja-cadastrado":{
                campo:"email",
                msg:"Este e-mail ou CPF já está cadastrado."
            },

            "erro-interno":{
                campo:"nome",
                msg:"Ocorreu um erro. Tente novamente."
            }

        };

        const params = new URLSearchParams(window.location.search);

        const erro = params.get("erro");

        if(
            erro &&
            mensagensServidor[erro]
        ){

            mostrarErro(
                mensagensServidor[erro].campo,
                "erro-"+mensagensServidor[erro].campo,
                mensagensServidor[erro].msg
            );

        }

    </script>

</body>
</html>
