<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bixuco — Criar conta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div><!-- lado esquerdo: foto + logo -->
        <div></div><!-- overlay -->
        <img src="/img/foto-bebe-pelucia.jpg" alt="Crianca segurando a pelucia Bixuco">
        <img src="/img/Logo_gato_sem_fundo.png" alt="Logo Bixuco">
    </div>

    <div><!-- lado direito: formulario -->

        <h2>Criar conta</h2>
        <hr>

        <form action="/cadastro-pai" method="POST" onsubmit="return validarCadastro()" novalidate>

            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" required>
            <span class="erro" id="erro-nome"></span>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <span class="erro" id="erro-email"></span>

            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX" inputmode="numeric" maxlength="15" oninput="mascaraTelefone(this)" required>
            <span class="erro" id="erro-telefone"></span>

            <label for="dataNascimento">Data de nascimento</label>
            <input type="date" id="dataNascimento" name="dataNascimento" required>
            <span class="erro" id="erro-dataNascimento"></span>

            <label for="senha">Senha</label>
            <div><!-- wrapper senha: input + olhinho -->
                <input type="password" id="senha" name="senha" required>
                <button type="button" onclick="toggleSenha('senha','icone-senha')" aria-label="Mostrar ou esconder senha">
                    <i class="fa-solid fa-eye" id="icone-senha"></i>
                </button>
            </div>
            <span class="erro" id="erro-senha"></span>

            <label for="senhaConfirmar">Confirmar senha</label>
            <div><!-- wrapper senha: input + olhinho -->
                <input type="password" id="senhaConfirmar" name="senhaConfirmar" required>
                <button type="button" onclick="toggleSenha('senhaConfirmar','icone-confirmar')" aria-label="Mostrar ou esconder confirmacao">
                    <i class="fa-solid fa-eye" id="icone-confirmar"></i>
                </button>
            </div>
            <span class="erro" id="erro-senhaConfirmar"></span>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpfUser" placeholder="XXX.XXX.XXX-XX" inputmode="numeric" maxlength="14" oninput="mascaraCPF(this)" required>
            <span class="erro" id="erro-cpf"></span>

            <label for="cep">CEP</label>
            <div><!-- wrapper cep: input + spinner -->
                <input type="text" id="cep" name="cep" placeholder="XXXXX-XXX" inputmode="numeric" maxlength="9" oninput="mascaraCEP(this)" required>
                <i class="fa-solid fa-spinner fa-spin" id="cep-spinner" style="display:none"></i>
            </div>
            <span class="erro" id="erro-cep"></span>
            <span id="cep-ok" style="display:none"></span>

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" name="cidade" readonly>

            <label for="estado">Estado</label>
            <input type="text" id="estado" name="estado" readonly>

            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" name="bairro" readonly>

            <button type="submit">Continuar</button>

            <p>
                Ao criar sua conta voce concorda com nossos
                <a href="/termos">Termos de uso</a> e
                <a href="/privacidade">Politica de privacidade</a>.
            </p>

        </form>

    </div>


    <script>

        function mascaraCPF(input) {
            let v = input.value.replace(/\D/g, "").slice(0, 11);
            if (v.length > 9)      v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/, "$1.$2.$3-$4");
            else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{0,3})/, "$1.$2.$3");
            else if (v.length > 3) v = v.replace(/(\d{3})(\d{0,3})/, "$1.$2");
            input.value = v;
        }

        function mascaraTelefone(input) {
            let v = input.value.replace(/\D/g, "").slice(0, 11);
            if (v.length > 10)     v = v.replace(/(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            else if (v.length > 6) v = v.replace(/(\d{2})(\d{4,5})(\d{0,4})/, "($1) $2-$3");
            else if (v.length > 2) v = v.replace(/(\d{2})(\d{0,5})/, "($1) $2");
            input.value = v;
        }

        function mascaraCEP(input) {
            let v = input.value.replace(/\D/g, "").slice(0, 8);
            if (v.length > 5) v = v.replace(/(\d{5})(\d{0,3})/, "$1-$2");
            input.value = v;
            if (v.replace(/\D/g, "").length === 8) {
                buscarCep(v.replace(/\D/g, ""));
            } else {
                document.getElementById("cep-ok").style.display = "none";
                document.getElementById("cidade").value = "";
                document.getElementById("estado").value = "";
                document.getElementById("bairro").value = "";
            }
        }

        async function buscarCep(cep) {
            const spinner = document.getElementById("cep-spinner");
            const ok      = document.getElementById("cep-ok");
            limparErro("cep", "erro-cep");
            ok.style.display      = "none";
            spinner.style.display = "inline";
            try {
                const res  = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await res.json();
                spinner.style.display = "none";
                if (data.erro) {
                    mostrarErro("cep", "erro-cep", "CEP nao encontrado. Confira e tente de novo.");
                    return;
                }
                document.getElementById("cidade").value = data.localidade || "";
                document.getElementById("estado").value = data.uf         || "";
                document.getElementById("bairro").value = data.bairro     || "";
                ok.textContent   = `✓ ${data.localidade} — ${data.uf}`;
                ok.style.display = "block";
            } catch (err) {
                spinner.style.display = "none";
                mostrarErro("cep", "erro-cep", "Erro ao buscar CEP. Verifique sua conexao.");
            }
        }

        function toggleSenha(inputId, iconeId) {
            const input = document.getElementById(inputId);
            const icone = document.getElementById(iconeId);
            if (input.type === "password") {
                input.type = "text";
                icone.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icone.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        // adiciona classe "input-erro" no input — o colega anima no css
        function mostrarErro(inputId, erroId, mensagem) {
            const input = document.getElementById(inputId);
            const erro  = document.getElementById(erroId);
            if (input) input.classList.add("input-erro");
            if (erro)  { erro.textContent = mensagem; erro.style.display = "block"; }
            if (input) setTimeout(() => input.classList.remove("input-erro"), 500);
        }

        function limparErro(inputId, erroId) {
            const input = document.getElementById(inputId);
            const erro  = document.getElementById(erroId);
            if (input) input.classList.remove("input-erro");
            if (erro)  erro.style.display = "none";
        }

        function limparTodosErros() {
            ["nome","email","telefone","dataNascimento","senha","senhaConfirmar","cpf","cep"]
                .forEach(id => limparErro(id, "erro-" + id));
        }

        function validarCadastro() {
            limparTodosErros();
            let valido = true;
            const nome      = document.getElementById("nome").value.trim();
            const email     = document.getElementById("email").value.trim();
            const tel       = document.getElementById("telefone").value.replace(/\D/g, "");
            const dataNasc  = document.getElementById("dataNascimento").value;
            const senha     = document.getElementById("senha").value;
            const confirmar = document.getElementById("senhaConfirmar").value;
            const cpf       = document.getElementById("cpf").value.replace(/\D/g, "");
            const cidade    = document.getElementById("cidade").value;

            if (nome.split(" ").filter(p => p).length < 2) {
                mostrarErro("nome", "erro-nome", "Digite seu nome completo.");
                valido = false;
            }
            if (!/\S+@\S+\.\S+/.test(email)) {
                mostrarErro("email", "erro-email", "Digite um email valido.");
                valido = false;
            }
            if (tel.length < 10) {
                mostrarErro("telefone", "erro-telefone", "Digite um telefone valido com DDD.");
                valido = false;
            }
            if (!dataNasc) {
                mostrarErro("dataNascimento", "erro-dataNascimento", "Informe sua data de nascimento.");
                valido = false;
            } else if (!maiorIdade(dataNasc)) {
                mostrarErro("dataNascimento", "erro-dataNascimento", "Voce precisa ter pelo menos 18 anos.");
                valido = false;
            }
            if (senha.length < 6) {
                mostrarErro("senha", "erro-senha", "A senha deve ter pelo menos 6 caracteres.");
                valido = false;
            }
            if (senha !== confirmar) {
                mostrarErro("senhaConfirmar", "erro-senhaConfirmar", "As senhas nao coincidem.");
                valido = false;
            }
            if (cpf.length !== 11) {
                mostrarErro("cpf", "erro-cpf", "CPF invalido. Digite os 11 numeros.");
                valido = false;
            }
            if (!cidade) {
                mostrarErro("cep", "erro-cep", "Informe um CEP valido.");
                valido = false;
            }
            return valido;
        }

        function maiorIdade(data) {
            const hoje = new Date();
            const nasc = new Date(data);
            let idade  = hoje.getFullYear() - nasc.getFullYear();
            const mes  = hoje.getMonth() - nasc.getMonth();
            if (mes < 0 || (mes === 0 && hoje.getDate() < nasc.getDate())) idade--;
            return idade >= 18;
        }

        // erros vindos do servidor via ?erro=
        const mensagensServidor = {
            "cpf-invalido":  { campo: "cpf",   msg: "CPF invalido." },
            "email-invalido":{ campo: "email",  msg: "Email invalido." },
            "senha-curta":   { campo: "senha",  msg: "A senha deve ter pelo menos 6 caracteres." },
            "ja-cadastrado": { campo: "email",  msg: "Este email ou CPF ja esta cadastrado." },
            "erro-interno":  { campo: "nome",   msg: "Ocorreu um erro. Tente novamente." }
        };
        const params  = new URLSearchParams(window.location.search);
        const erroUrl = params.get("erro");
        if (erroUrl && mensagensServidor[erroUrl]) {
            const { campo, msg } = mensagensServidor[erroUrl];
            mostrarErro(campo, "erro-" + campo, msg);
        }

    </script>

</body>
</html>
