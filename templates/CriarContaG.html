<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Bixuco — Criar conta</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >
    <link
        rel="stylesheet"
        href="/css/criarcontag.css"
    >
</head>

<body>
    <main>

        <!-- ========================= -->
        <!-- LADO ESQUERDO -->
        <!-- ========================= -->
        <section>

            <div>
                <!-- Logo branca -->
                <img
                    src="/img/Logo_Branca.png"
                    alt="Logo Bixuco"
                >

                <!-- Título -->
                <h1>
                    Crie sua conta
                </h1>

                <!-- Texto -->
                <p>
                    Pais e terapeutas juntos pelo
                    bem-estar da criança.
                </p>
            </div>

            <div>
                <img
                    src="/img/familia-bixuco.png"
                    alt="Família utilizando o Bixuco"
                >
            </div>

        </section>

        <!-- ========================= -->
        <!-- LADO DIREITO -->
        <!-- ========================= -->
        <section>

            <header>
                <h2>
                    Criar conta
                </h2>
            </header>

            <div>

                <!-- Barra de progresso -->
                <div class="cadastro-progresso">
                    <span class="ativo"></span>
                    <span class="ativo"></span>
                    <span></span>
                </div>

                <h3>
                    Informações sobre você
                </h3>

                <!-- ========================= -->
                <!-- FORMULÁRIO -->
                <!-- ========================= -->

                <!-- 🔧 FIX 1: Removido action e method do form -->
                <!-- Envio via fetch para poder exibir erros do servidor na tela -->
                <form id="formCadastro" novalidate>

                    <!-- Nome -->
                    <div class="cadastro-form__grupo">
                        <label for="nome">
                            Nome completo
                        </label>
                        <input
                            type="text"
                            id="nome"
                            name="nome"
                            placeholder="Digite seu nome completo"
                            autocomplete="name"
                            required
                        >
                        <span
                            class="cadastro-form__erro"
                            id="erro-nome"
                        ></span>
                    </div>

                    <!-- Email -->
                    <div class="cadastro-form__grupo">
                        <label for="email">
                            Email
                        </label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Digite seu e-mail"
                            autocomplete="email"
                            required
                        >
                        <span
                            class="cadastro-form__erro"
                            id="erro-email"
                        ></span>
                    </div>

                    <!-- Linha telefone + data -->
                    <div class="cadastro-form__linha">

                        <!-- 🔧 FIX 4 + 5: Classe cadastro-form__grupo e cadastro-form__erro
                             adicionadas nos campos que estavam sem — consistente com nome e email -->

                        <!-- Telefone -->
                        <div class="cadastro-form__grupo">
                            <label for="telefone">
                                Telefone (opcional)
                            </label>
                            <input
                                type="tel"
                                id="telefone"
                                name="telefone"
                                placeholder="(00) 00000-0000"
                                autocomplete="tel"
                            >
                            <span
                                class="cadastro-form__erro"
                                id="erro-telefone"
                            ></span>
                        </div>

                        <!-- Data de nascimento -->
                        <div class="cadastro-form__grupo">
                            <label for="dataNascimento">
                                Data de nascimento
                            </label>
                            <input
                                type="date"
                                id="dataNascimento"
                                name="dataNascimento"
                                required
                            >
                            <span
                                class="cadastro-form__erro"
                                id="erro-dataNascimento"
                            ></span>
                        </div>

                    </div>

                    <!-- CPF -->
                    <div class="cadastro-form__grupo">
                        <label for="cpf">
                            CPF
                        </label>
                        <input
                            type="text"
                            id="cpf"
                            name="cpfUser"
                            placeholder="000.000.000-00"
                            maxlength="14"
                            inputmode="numeric"
                            oninput="mascaraCPF(this)"
                            required
                        >
                        <span
                            class="cadastro-form__erro"
                            id="erro-cpf"
                        ></span>
                    </div>

                    <!-- ========================= -->
                    <!-- 🔧 FIX 8: Campos de endereço que o backend espera -->
                    <!-- /continuar-cadastro-pai desestrutura cep, cidade, estado, bairro -->
                    <!-- Sem esses campos req.session.cadastro fica com undefined -->
                    <!-- ========================= -->

                    <!-- CEP -->
                    <div class="cadastro-form__grupo">
                        <label for="cep">
                            CEP
                        </label>
                        <input
                            type="text"
                            id="cep"
                            name="cep"
                            placeholder="00000-000"
                            maxlength="9"
                            inputmode="numeric"
                            oninput="mascaraCEP(this)"
                            required
                        >
                        <span
                            class="cadastro-form__erro"
                            id="erro-cep"
                        ></span>
                    </div>

                    <!-- Linha cidade + estado -->
                    <div class="cadastro-form__linha">

                        <!-- Cidade -->
                        <div class="cadastro-form__grupo">
                            <label for="cidade">
                                Cidade
                            </label>
                            <input
                                type="text"
                                id="cidade"
                                name="cidade"
                                placeholder="Sua cidade"
                                autocomplete="address-level2"
                                required
                                readonly
                            >
                            <span
                                class="cadastro-form__erro"
                                id="erro-cidade"
                            ></span>
                        </div>

                        <!-- Estado -->
                        <div class="cadastro-form__grupo">
                            <label for="estado">
                                Estado
                            </label>
                            <input
                                type="text"
                                id="estado"
                                name="estado"
                                placeholder="UF"
                                maxlength="2"
                                autocomplete="address-level1"
                                required
                                readonly
                            >
                            <span
                                class="cadastro-form__erro"
                                id="erro-estado"
                            ></span>
                        </div>

                    </div>

                    <!-- Bairro -->
                    <div class="cadastro-form__grupo">
                        <label for="bairro">
                            Bairro
                        </label>
                        <input
                            type="text"
                            id="bairro"
                            name="bairro"
                            placeholder="Seu bairro"
                            required
                            readonly
                        >
                        <span
                            class="cadastro-form__erro"
                            id="erro-bairro"
                        ></span>
                    </div>

                    <!-- 🔧 FIX 2: Erro geral do servidor (substitui o sistema de ?erro= na URL) -->
                    <span
                        id="erro-geral"
                        class="cadastro-form__erro cadastro-form__erro--geral"
                        style="display: none;"
                    ></span>

                    <!-- 🔧 FIX 3 + 6: Removido href inválido, botão com estado de carregamento -->
                    <button
                        type="submit"
                        id="btnContinuar"
                    >
                        Continuar
                    </button>

                </form>

                <!-- Termos -->
                <p>
                    Ao criar sua conta você concorda com nossos
                    <a href="/termos">Termos de uso</a>
                    e
                    <a href="/privacidade">Política de privacidade.</a>
                </p>

            </div>

        </section>

    </main>

    <script>

        // ==========================
        // MÁSCARA DO CPF
        // ==========================

        function mascaraCPF(input) {

            let valor = input.value.replace(/\D/g, "").slice(0, 11);

            if (valor.length > 9) {
                valor = valor.replace(
                    /(\d{3})(\d{3})(\d{3})(\d{0,2})/,
                    "$1.$2.$3-$4"
                );
            } else if (valor.length > 6) {
                valor = valor.replace(
                    /(\d{3})(\d{3})(\d{0,3})/,
                    "$1.$2.$3"
                );
            } else if (valor.length > 3) {
                valor = valor.replace(
                    /(\d{3})(\d{0,3})/,
                    "$1.$2"
                );
            }

            input.value = valor;

        }

        // ==========================
        // MÁSCARA DO TELEFONE
        // ==========================

        document.getElementById("telefone").addEventListener("input", function () {

            let valor = this.value.replace(/\D/g, "").slice(0, 11);

            if (valor.length > 10) {
                valor = valor.replace(
                    /(\d{2})(\d{5})(\d{4})/,
                    "($1) $2-$3"
                );
            } else if (valor.length > 6) {
                valor = valor.replace(
                    /(\d{2})(\d{4})(\d+)/,
                    "($1) $2-$3"
                );
            } else if (valor.length > 2) {
                valor = valor.replace(
                    /(\d{2})(\d+)/,
                    "($1) $2"
                );
            }

            this.value = valor;

        });

        // ==========================
        // MÁSCARA DO CEP
        // ==========================

        function mascaraCEP(input) {

            let valor = input.value.replace(/\D/g, "").slice(0, 8);

            if (valor.length > 5) {
                valor = valor.replace(/(\d{5})(\d{0,3})/, "$1-$2");
            }

            input.value = valor;

        }

        // ==========================
        // BUSCA CEP AUTOMATICAMENTE
        // ==========================

        // 🔧 FIX 8: Ao digitar o CEP completo, busca cidade/estado/bairro
        // automaticamente via API ViaCEP e preenche os campos readonly
        document.getElementById("cep").addEventListener("blur", async function () {

            const cep = this.value.replace(/\D/g, "");

            if (cep.length !== 8) return;

            try {

                const resposta = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const dados = await resposta.json();

                if (dados.erro) {

                    mostrarErro("cep", "erro-cep", "CEP não encontrado.");
                    return;

                }

                // Preenche os campos automaticamente
                document.getElementById("cidade").value  = dados.localidade || "";
                document.getElementById("estado").value  = dados.uf || "";
                document.getElementById("bairro").value  = dados.bairro || "";

                // Remove readonly do bairro para o usuário corrigir se precisar
                document.getElementById("bairro").removeAttribute("readonly");

            } catch (erro) {

                console.log("Erro ao buscar CEP:", erro);

            }

        });

        // ==========================
        // MOSTRAR / LIMPAR ERROS
        // ==========================

        function mostrarErro(inputId, erroId, mensagem) {

            const input = document.getElementById(inputId);
            const erro  = document.getElementById(erroId);

            if (!input || !erro) return;

            input.classList.add("input-erro");
            erro.textContent  = mensagem;
            erro.style.display = "block";

            setTimeout(() => {
                input.classList.remove("input-erro");
            }, 500);

        }

        function limparErros() {

            [
                "nome",
                "email",
                "telefone",
                "dataNascimento",
                "cpf",
                "cep",
                "cidade",
                "estado",
                "bairro"
            ].forEach(id => {

                const campo = document.getElementById(id);
                const erro  = document.getElementById("erro-" + id);

                if (campo) campo.classList.remove("input-erro");
                if (erro) {
                    erro.style.display = "none";
                    erro.textContent   = "";
                }

            });

            // Limpa também o erro geral
            const erroGeral = document.getElementById("erro-geral");
            if (erroGeral) erroGeral.style.display = "none";

        }

        // ==========================
        // VERIFICAR MAIOR DE IDADE
        // ==========================

        function maiorIdade(data) {

            const hoje       = new Date();
            const nascimento = new Date(data);
            let   idade      = hoje.getFullYear() - nascimento.getFullYear();
            const mes        = hoje.getMonth() - nascimento.getMonth();

            if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
                idade--;
            }

            return idade >= 18;

        }

        // ==========================
        // VALIDAÇÃO LOCAL
        // ==========================

        function validarCampos() {

            limparErros();
            let valido = true;

            const nome          = document.getElementById("nome").value.trim();
            const email         = document.getElementById("email").value.trim();
            const telefone      = document.getElementById("telefone").value.trim();
            const data          = document.getElementById("dataNascimento").value;
            const cpf           = document.getElementById("cpf").value.replace(/\D/g, "");
            const cep           = document.getElementById("cep").value.replace(/\D/g, "");
            const cidade        = document.getElementById("cidade").value.trim();
            const estado        = document.getElementById("estado").value.trim();
            const bairro        = document.getElementById("bairro").value.trim();

            const regexEmail    = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (nome.split(" ").filter(p => p).length < 2) {
                mostrarErro("nome", "erro-nome", "Digite seu nome completo.");
                valido = false;
            }

            if (!regexEmail.test(email)) {
                mostrarErro("email", "erro-email", "Digite um e-mail válido.");
                valido = false;
            }

            if (telefone && telefone.replace(/\D/g, "").length < 10) {
                mostrarErro("telefone", "erro-telefone", "Telefone inválido.");
                valido = false;
            }

            if (!data) {
                mostrarErro("dataNascimento", "erro-dataNascimento", "Informe sua data de nascimento.");
                valido = false;
            } else if (!maiorIdade(data)) {
                mostrarErro("dataNascimento", "erro-dataNascimento", "Você precisa ter pelo menos 18 anos.");
                valido = false;
            }

            // 🔧 FIX 7: Validação mais descritiva do CPF
            // O backend tem a validação real com dígitos verificadores
            // aqui garantimos pelo menos o formato correto
            if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) {
                mostrarErro("cpf", "erro-cpf", "CPF inválido. Verifique os números digitados.");
                valido = false;
            }

            if (cep.length !== 8) {
                mostrarErro("cep", "erro-cep", "Digite um CEP válido.");
                valido = false;
            }

            if (!cidade) {
                mostrarErro("cidade", "erro-cidade", "Cidade não encontrada. Verifique o CEP.");
                valido = false;
            }

            if (!estado) {
                mostrarErro("estado", "erro-estado", "Estado não encontrado. Verifique o CEP.");
                valido = false;
            }

            if (!bairro) {
                mostrarErro("bairro", "erro-bairro", "Informe seu bairro.");
                valido = false;
            }

            return valido;

        }

        // ==========================
        // ENVIO DO FORMULÁRIO
        // ==========================

        // 🔧 FIX 1 + 2: Intercepta o submit e envia via fetch
        // Antes o form fazia POST direto e erros chegavam via ?erro= na URL
        // Agora os erros aparecem direto nos campos sem sair da página

        document.getElementById("formCadastro").addEventListener("submit", async (evento) => {

            evento.preventDefault();

            if (!validarCampos()) return;

            const btnContinuar = document.getElementById("btnContinuar");
            const erroGeral    = document.getElementById("erro-geral");

            // 🔧 FIX 6: Desabilita o botão enquanto processa
            btnContinuar.disabled    = true;
            btnContinuar.textContent = "Enviando...";

            try {

                const resposta = await fetch("/continuar-cadastro-pai", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        nome:           document.getElementById("nome").value.trim(),
                        email:          document.getElementById("email").value.trim(),
                        telefone:       document.getElementById("telefone").value.trim(),
                        dataNascimento: document.getElementById("dataNascimento").value,
                        cpfUser:        document.getElementById("cpf").value,
                        cep:            document.getElementById("cep").value,
                        cidade:         document.getElementById("cidade").value.trim(),
                        estado:         document.getElementById("estado").value.trim(),
                        bairro:         document.getElementById("bairro").value.trim()
                    })
                });

                // Redirecionamento bem-sucedido (backend redireciona para /CriarContaSenha)
                if (resposta.redirected) {
                    window.location.href = resposta.url;
                    return;
                }

                // 🔧 FIX 2: Exibe erros do servidor direto nos campos
                if (!resposta.ok) {

                    const dados = await resposta.json();

                    // Tenta mostrar no campo específico, senão mostra no geral
                    if (dados.campo) {
                        mostrarErro(dados.campo, "erro-" + dados.campo, dados.erro);
                    } else {
                        erroGeral.textContent  = dados.erro || "Erro ao continuar. Tente novamente.";
                        erroGeral.style.display = "block";
                    }

                }

            } catch (erro) {

                console.log("Erro na requisição:", erro);

                erroGeral.textContent  = "Erro de conexão. Verifique sua internet e tente novamente.";
                erroGeral.style.display = "block";

            } finally {

                // Reabilita o botão independente do resultado
                btnContinuar.disabled    = false;
                btnContinuar.textContent = "Continuar";

            }

        });

    </script>

</body>
</html>
