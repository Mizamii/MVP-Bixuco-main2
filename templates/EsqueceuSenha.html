<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Bixuco — Recuperar senha</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >
    <link
        rel="stylesheet"
        href="/css/esqueceusenha.css"
    >
</head>
<body>
    <main>

        <!--lado esquerdo-->

        <section>

            <div>
                <!-- Logo branca -->
                <img
                    src="/img/Logo_Branca.png"
                    alt="Logo Bixuco"
                >

                <h1>
                    Acompanhamento
                    <br>
                    infantil
                    <span>inteligente.</span>
                </h1>

                <p>
                    Mais organização, mais conexão e mais cuidado
                    para famílias e terapeutas.
                </p>
            </div>

            <div>
                <img
                    src="/img/login-urso.png"
                    alt="Criança abraçando o Bixuco"
                >
            </div>

        </section>

        <!--lado direito-->

        <section>

            <!-- Logo colorida -->
            <img
                src="/img/Logo_Gato.png"
                alt="Logo Bixuco"
            >

            <!-- Título -->
            <h2>
                Recuperar senha
            </h2>

            <!-- Subtítulo -->
            <h3>
                Esqueceu sua senha?
            </h3>

            <!-- Texto explicativo -->
            <p>
                Informe o e-mail cadastrado em sua conta.
                Enviaremos um link para que você possa criar
                uma nova senha com segurança.
            </p>

            <!-- formulario de recuperacao -->

            <form
                action="/esqueceu-senha"
                method="POST"
                onsubmit="return validarEmail()"
            >

            <!-- campo de email -->
                <div>
                    <label
                        for="email"
                    >
                        Email cadastrado
                    </label>

                    <div>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Digite seu e-mail"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <!-- mensagem de erro -->
                    <span
                        class="recuperar-form__erro"
                        id="erro-email"
                    >
                    </span>

                </div>

                <!-- botao para enviar o link -->
                <button
                    type="submit"
                >
                    Enviar link de recuperação
                </button>
            </form>

            <!-- botao para voltar ao login -->
            <a
                href="/logar"
            >
                Voltar para o login
            </a>

        </section>

    </main>

    <script>

        // mostra uma mensagem de erro abaixo do campo
        function mostrarErro(inputId, erroId, mensagem) {

            const input = document.getElementById(inputId);
            const erro = document.getElementById(erroId);

            input.classList.add("input-erro");
            erro.textContent = mensagem;
            erro.style.display = "block";

            setTimeout(() => {
                input.classList.remove("input-erro");
            }, 500);

        }

        // limpa as mensagens de erro
        function limparErros() {

            const input = document.getElementById("email");
            const erro = document.getElementById("erro-email");

            input.classList.remove("input-erro");
            erro.style.display = "none";
            erro.textContent = "";

        }

        // valida o email antes de enviar o formulario
        function validarEmail() {

            limparErros();

            let valido = true;

            const email = document.getElementById("email").value.trim();

            // expressao regular para validar email
            const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            // verifica se o email foi preenchido corretamente
            if (!regexEmail.test(email)) {

                mostrarErro(
                    "email",
                    "erro-email",
                    "Digite um e-mail válido."
                );

                valido = false;

            }
            return valido;
        }
    </script>

</body>
</html>
