<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci a senha</title>
    
   <style>
        .logo{
        margin-right: 60px;
        margin-left: 40px;
        height: 75px;   
        }
        body {
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh; 
        margin: 0;
        }
        .texto {
        font-family: 'Inter', sans-serif; 
        margin-top: 100px;
        margin-left: 200px;
        margin-right: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        }
        .titulomed {
        font-family: 'Inter', sans-serif; 
        font-size: 28px;               
        font-weight: 700;   
        margin-top: 50px;
        }
        input[type="email"] {
        width: 400px;         
        height: 50px;
        background-color: #79D836; 
        border: none;
        border-radius: 15px;  
        padding: 0 20px;
        margin-bottom: 20px;
        color: white;   
        border: none;
        outline: none; 
        }
        .subtitulo {
        font-family: 'Inter', sans-serif; 
        width: 440px;           
        font-size: 18px;  
        display: flex;
        justify-content: flex-start;
        margin-bottom: 5px;
        } 
        .rodape{
            background-color: #1D8EC9;
            color: white;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 0 auto;
            overflow-x: hidden;
            gap: 105px;
            margin-top: auto;
        }
        .btn {
            width: 440px;
            height: 60px;
            background-color: #0AB7FB;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            
        }
        .btn:hover {
            background-color: #1D8EC9;
            cursor: pointer;
            transform: scale(1.0);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    
    <header>
        <img class="logo" src="../static/img/Logo_nome.png" alt="">
    </header>

    <div class="texto">
        <h1 class="titulomed">Será enviado um e-mail para alterar a senha</h1>
        
        <p class="subtitulo">Digite o seu e-mail:</p>
        <br>
        <input type="email" placeholder="email@exemplo.com">
        
        <button class="btn" onclick="window.location.href='ContaExistente.html'">Enviar e-mail</button>
    </div>

    <footer class="rodape">
    <p>Política de privacidade</p>
    <span>|</span>
    <p>Termos de uso</p>
    <span>|</span>
    <p>Sobre nós</p>
</footer>
</body>
</html>
