<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci a senha</title>

    <style>
        .logo{
        margin-right: 60px;
        margin-left: 40px;
        height: 75px;   
        }
        body {
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh; 
        margin: 0;
        }
        .texto {
        font-family: 'Inter', sans-serif; 
        margin-top: 100px;
        margin-left: 200px;
        margin-right: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        }
        .titulomed {
        font-family: 'Inter', sans-serif; 
        font-size: 28px;               
        font-weight: 700;   
        margin-top: 50px;
        }
        input[type="email"] {
        width: 400px;         
        height: 50px;
        background-color: #79D836; 
        border: none;
        border-radius: 15px;  
        padding: 0 20px;
        margin-bottom: 20px;
        color: white;   
        border: none;
        outline: none; 
        }
        .subtitulo {
        font-family: 'Inter', sans-serif; 
        width: 440px;           
        font-size: 18px;  
        display: flex;
        justify-content: flex-start;
        margin-bottom: 5px;
        } 
        .rodape{
            background-color: #1D8EC9;
            color: white;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 0 auto;
            overflow-x: hidden;
            gap: 105px;
            margin-top: auto;
        }
        .btn {
            width: 440px;
            height: 60px;
            background-color: #0AB7FB;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            
        }
        .btn:hover {
            background-color: #1D8EC9;
            cursor: pointer;
            transform: scale(1.0);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
 
    <div><!-- lado esquerdo: foto + logo -->
        <div></div><!-- overlay -->
        <img src="/img/FotoUrso.jpg" alt="Crianca segurando a pelucia Bixuco">
        <div>
            <img src="/img/Logo_nome.png" alt="Logo Bixuco">
        </div>
    </div>
 
    <div><!-- lado direito -->
 
        <img src="/img/Logo_gato_sem_fundo.png" alt="Logo Bixuco">
 
        <h2>Recuperar senha</h2>
 
        <h1>Esqueceu a senha?</h1>
        <p>Informe seu email e enviaremos um link para criar uma nova senha.</p>
 
 
        <form action="/esqueceu-senha" method="POST" onsubmit="return validarEmail()">
            <label for="email">Email cadastrado</label>
            <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
            <span class="erro" id="erro-email"></span>
 
            <button type="submit">Enviar email</button>
        </form>
 
        <a href="/logar">Voltar para o login</a>
 
    </div>
 
 
    <script>
 
        function validarEmail() {
            const email = document.getElementById("email").value.trim();
            const erro  = document.getElementById("erro-email");
 
            erro.style.display = "none";
            erro.textContent   = "";
 
            if (!/\S+@\S+\.\S+/.test(email)) {
                erro.textContent   = "Digite um email valido.";
                erro.style.display = "block";
                return false;
            }
            return true;
        }
 
    </script>
 
</body>
</html>
