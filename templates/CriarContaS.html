<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bixuco — Criar conta</title>
    <!-- icones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --verde-escuro:      #32C26D;
            --verde-claro:       #79D836;
            --azul-claro:        #0AB7FB;
            --azul-escuro:       #1D8EC9;
            --branco:            #F8FAFD;
            --cinza-claro:       #D9D9D9;
            --cinza-escuro:      #5A5A5A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: var(--branco);
            height: 100vh;
            overflow: hidden;
        }

        .pagina-criar-conta {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Lado esquerdo: foto */
        .criar-esquerda {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .criar-esquerda__overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 5;
        }

        .criar-esquerda__foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .criar-esquerda__logo {
            position: absolute;
            width: 70%;
            max-width: 400px;
            z-index: 10;
        }

        /* Lado direito: conteúdo */
        .criar-direita {
            flex: 1;
            background: var(--branco);
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow-y: auto;
        }

        .criar-direita__cabecalho-topo {
            padding: 2.5rem 3rem;
            text-align: center;
            border-bottom: 1px solid var(--cinza-claro);
        }

        .criar-direita__titulo {
            font-size: 1.8rem;
            color: var(--cinza-escuro);
            font-weight: 700;
            margin: 0;
        }

        .criar-direita__conteudo {
            padding: 2.5rem 3rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .criar-direita__subtitulo {
            color: var(--cinza-escuro);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .criar-direita__ajuda {
            font-size: 0.8rem;
            color: var(--cinza-claro);
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .tipo-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .tipo-card {
            background: white;
            border: 2px solid var(--cinza-claro);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .tipo-card:hover {
            border-color: var(--azul-claro);
        }

        .tipo-card--selecionado {
            border-color: var(--azul-claro);
            background: rgba(10, 183, 251, 0.05);
        }

        .tipo-card__titulo {
            font-size: 1rem;
            font-weight: 600;
            color: var(--cinza-escuro);
        }

        .tipo-card__descricao {
            font-size: 0.85rem;
            color: var(--cinza-escuro);
            opacity: 0.85;
        }

        .tipo-card__seta {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cinza-claro);
            font-size: 0.9rem;
        }

        .tipo-card__aviso {
            display: none;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            background: rgba(10, 183, 251, 0.1);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--cinza-escuro);
            align-items: center;
            gap: 0.5rem;
            animation: fadeIn 0.25s ease;
        }

        .tipo-card:hover .tipo-card__aviso {
            display: flex;
        }

        .tipo-card__aviso--psicologo {
            background: rgba(10, 183, 251, 0.1);
        }

        .tipo-card__aviso--responsavel {
            background: rgba(50, 194, 109, 0.1);
        }

        .tipo-card__aviso-icone {
            font-size: 0.85rem;
        }

        .tipo-card__aviso--psicologo .tipo-card__aviso-icone {
            color: var(--azul-escuro);
        }

        .tipo-card__aviso--responsavel .tipo-card__aviso-icone {
            color: var(--verde-escuro);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .criar-ja-tenho-conta {
            margin-top: auto;
            text-align: center;
            color: var(--cinza-escuro);
            font-size: 0.9rem;
            padding-top: 2rem;
        }

        .criar-ja-tenho-conta__link {
            color: var(--azul-escuro);
            font-weight: 600;
            text-decoration: none;
        }

        .criar-ja-tenho-conta__link:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .pagina-criar-conta {
                flex-direction: column;
            }

            .criar-esquerda {
                height: 30vh;
            }

            .criar-direita {
                flex: 1;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="pagina-criar-conta">

        <!-- Lado esquerdo: foto -->
        <div class="criar-esquerda">
            <img
                class="criar-esquerda__foto"
                src="../static/img/FotoUrso.jpg"
                alt="Criança segurando a pelúcia Bixuco"
            >
            <div class="criar-esquerda__overlay"></div>
            <img
                class="criar-esquerda__logo"
                src="../static/img/Logo_nome.png"
                alt="Logo Bixuco"
            >
        </div>

        <!-- Lado direito: conteúdo -->
        <div class="criar-direita">

            <!-- Título com divisão -->
            <div class="criar-direita__cabecalho-topo">
                <h2 class="criar-direita__titulo">Criar conta</h2>
            </div>

            <div class="criar-direita__conteudo">
                <!-- Subtítulo -->
                <p class="criar-direita__subtitulo">Como você vai utilizar o Bixuco?</p>
                <p class="criar-direita__ajuda">Isso vai nos ajudar a personalizar a sua experiência</p>

                <!-- Cards de seleção -->
                <div class="tipo-container">

                <!-- Responsável -->
                <button
                    class="tipo-card"
                    id="cardResponsavel"
                    onclick="selecionarTipo('responsavel')"
                    aria-label="Criar conta como responsável"
                >
                    <span class="tipo-card__titulo">Sou responsável</span>
                    <span class="tipo-card__descricao">Acompanho o desenvolvimento do meu filho(a)</span>
                    <div class="tipo-card__aviso tipo-card__aviso--responsavel">
                        <i class="fa-solid fa-circle-info tipo-card__aviso-icone"></i>
                        Você poderá registar o desenvolvimento do seu filho(a)
                    </div>
                    <i class="fa-solid fa-chevron-right tipo-card__seta"></i>
                </button>

                <!-- Terapeuta -->
                <button
                    class="tipo-card tipo-card--selecionado"
                    id="cardPsicologo"
                    onclick="selecionarTipo('psicologo')"
                    aria-label="Criar conta como terapeuta"
                >
                    <span class="tipo-card__titulo">Sou terapeuta</span>
                    <span class="tipo-card__descricao">Acompanho pacientes profissionalmente</span>
                    <div class="tipo-card__aviso tipo-card__aviso--psicologo">
                        <i class="fa-solid fa-circle-info tipo-card__aviso-icone"></i>
                        Para criar conta como terapeuta você vai precisar do seu número de CRP
                    </div>
                    <i class="fa-solid fa-chevron-right tipo-card__seta"></i>
                </button>

                </div>

                <!-- Link para login -->
                <p class="criar-ja-tenho-conta">
                    Já tem conta?
                    <a class="criar-ja-tenho-conta__link" href="/logar">Fazer login</a>
                </p>

            </div>

        </div>

    </div>

    <script>
        const destinos = {
            responsavel: "/CriarContaG",
            psicologo:   "/CriarContaP"
        };

        function selecionarTipo(tipo) {
            // Remove seleção anterior
            document.querySelectorAll(".tipo-card").forEach(card => {
                card.classList.remove("tipo-card--selecionado");
            });

            // Marca o card clicado
            const idCard = tipo === "responsavel" ? "cardResponsavel" : "cardPsicologo";
            document.getElementById(idCard).classList.add("tipo-card--selecionado");

            // Redireciona
            setTimeout(() => {
                window.location.href = destinos[tipo];
            }, 300);
        }
    </script>

</body>
</html>
