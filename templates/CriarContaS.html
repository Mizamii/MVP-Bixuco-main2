<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bixuco — Criar conta</title>

    <!-- Biblioteca de ícones -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- CSS da página -->
    <link
        rel="stylesheet"
        href="/css/criarcontas.css"
    >
</head>

<body>
    <main>

        <!-- lado esquerdo -->
        <section>

            <div>
                <!-- Logo branca -->
                <img
                    src="/img/Logo_Branca.png"
                    alt="Logo Bixuco"
                >

                <!-- Título -->
                <h1>
                    Crie sua conta
                </h1>

                <!-- Texto -->
                <p>
                    Pais e terapeutas juntos pelo bem-estar da criança.
                </p>
            </div>

            <!-- Ilustração -->
            <div>
                <img
                    src="/img/familia-bixuco.png"
                    alt="Família utilizando o Bixuco"
                >
            </div>
        </section>

        <!-- lado direito -->
        <section>

            <img
                src="/img/Logo_Gato.png"
                alt="Logo Bixuco"
            >

            <h2>
                Criar conta
            </h2>

            <!-- Barra de progresso -->
            <div class="progresso" aria-label="Etapas de criação de conta">
                <span class="progresso__item progresso__item--ativo"></span>
                <span class="progresso__item"></span>
                <span class="progresso__item"></span>
            </div>

            <h3>
                Como você vai utilizar o Bixuco?
            </h3>

            <!-- Texto auxiliar -->
            <p>
                Isso vai nos ajudar a personalizar sua experiência.
            </p>

            <!-- Cards -->
            <div class="tipo-container">

                <!-- Card responsável -->
                <button
                    id="cardResponsavel"
                    class="tipo-card"
                    type="button"
                    onclick="selecionarTipo('responsavel')"
                    aria-pressed="false"
                >
                    <div>
                        <h4>
                            Sou responsável
                        </h4>

                        <p>
                            Acompanho o desenvolvimento do meu filho(a).
                        </p>
                    </div>
                </button>

                <!-- Card terapeuta -->
                <button
                    id="cardPsicologo"
                    class="tipo-card"
                    type="button"
                    onclick="selecionarTipo('psicologo')"
                    aria-pressed="false"
                >
                    <div>
                        <h4>
                            Sou terapeuta
                        </h4>

                        <p>
                            Acompanho pacientes profissionalmente.
                        </p>

                        <div>
                            Requer validação de CRP
                        </div>
                    </div>
                </button>
            </div>

            <!-- Botão para continuar -->
            <button
                type="button"
                onclick="continuar()"
            >
                Continuar
            </button>

            <!-- Link para login -->
            <p>
                Já possui uma conta?
                <a href="/logar">
                    Fazer login
                </a>
            </p>
        </section>

    </main>

    <script>
        // guarda o tipo selecionado
        let tipoSelecionado = null;

        // seleciona um dos cards
        function selecionarTipo(tipo) {
            tipoSelecionado = tipo;

            // remove seleção anterior
            document.querySelectorAll(".tipo-card").forEach(card => {
                card.classList.remove("tipo-card--ativo");
                card.setAttribute("aria-pressed", "false");
            });

            // adiciona seleção ao card clicado
            if (tipo === "responsavel") {
                document
                    .getElementById("cardResponsavel")
                    .classList.add("tipo-card--ativo");

                document
                    .getElementById("cardResponsavel")
                    .setAttribute("aria-pressed", "true");
            } else if (tipo === "psicologo") {
                document
                    .getElementById("cardPsicologo")
                    .classList.add("tipo-card--ativo");

                document
                    .getElementById("cardPsicologo")
                    .setAttribute("aria-pressed", "true");
            }
        }

        // verifica se o usuário selecionou um tipo
        function continuar() {
            if (tipoSelecionado === null) {
                alert("Selecione como deseja utilizar o Bixuco.");
                return;
            }

            // redireciona para a próxima etapa
            if (tipoSelecionado === "responsavel") {
                window.location.href = "/CriarContaG";
            } else if (tipoSelecionado === "psicologo") {
                window.location.href = "/CriarContaP";
            }
        }
    </script>

</body>
</html>
