<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bixuco — Criar conta</title>

    <!-- Biblioteca de ícones -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- CSS da página -->
    <link
        rel="stylesheet"
        href="/css/criarcontas.css"
    >
</head>

<body>
    <main>

        <!-- ========================= -->
        <!-- LADO ESQUERDO -->
        <!-- ========================= -->
        <section>

            <div>
                <!-- Logo branca -->
                <img
                    src="/img/Logo_Branca.png"
                    alt="Logo Bixuco"
                >

                <!-- Título -->
                <h1>
                    Crie sua conta
                </h1>

                <!-- Texto -->
                <p>
                    Pais e terapeutas juntos pelo bem-estar da criança.
                </p>
            </div>

            <!-- Ilustração -->
            <div>
                <img
                    src="/img/familia-bixuco.png"
                    alt="Família utilizando o Bixuco"
                >
            </div>

        </section>

        <!-- ========================= -->
        <!-- LADO DIREITO -->
        <!-- ========================= -->
        <section>

            <img
                src="/img/Logo_Gato.png"
                alt="Logo Bixuco"
            >

            <h2>
                Criar conta
            </h2>

            <!-- Barra de progresso -->
            <div class="progresso" aria-label="Etapas de criação de conta">
                <span class="progresso__item progresso__item--ativo"></span>
                <span class="progresso__item"></span>
                <span class="progresso__item"></span>
            </div>

            <h3>
                Como você vai utilizar o Bixuco?
            </h3>

            <!-- Texto auxiliar -->
            <p>
                Isso vai nos ajudar a personalizar sua experiência.
            </p>

            <!-- Cards de seleção -->
            <div class="tipo-container">

                <!-- Card responsável -->
                <button
                    id="cardResponsavel"
                    class="tipo-card"
                    type="button"
                    onclick="selecionarTipo('responsavel')"
                    aria-pressed="false"
                >
                    <div>
                        <h4>
                            Sou responsável
                        </h4>

                        <p>
                            Acompanho o desenvolvimento do meu filho(a).
                        </p>
                    </div>
                </button>

                <!-- Card terapeuta -->
                <button
                    id="cardPsicologo"
                    class="tipo-card"
                    type="button"
                    onclick="selecionarTipo('psicologo')"
                    aria-pressed="false"
                >
                    <div>
                        <h4>
                            Sou terapeuta
                        </h4>

                        <p>
                            Acompanho pacientes profissionalmente.
                        </p>

                        <div class="tag-crp">
                            Requer validação de CRP
                        </div>
                    </div>
                </button>

            </div>

            <!-- 🔧 FIX 1: Mensagem inline em vez de alert() -->
            <!-- Aparece só se o usuário clicar em Continuar sem selecionar nada -->
            <!-- Padrão igual às outras páginas do projeto -->
            <span
                id="erro-selecao"
                class="erro-selecao"
                style="display: none;"
            >
                Selecione como deseja utilizar o Bixuco.
            </span>

            <!-- 🔧 FIX 2: Botão começa desabilitado -->
            <!-- Fica ativo apenas quando um card é selecionado -->
            <!-- Evita o usuário clicar sem ter feito nenhuma escolha -->
            <button
                type="button"
                id="btnContinuar"
                onclick="continuar()"
                disabled
            >
                Continuar
            </button>

            <!-- Link para login -->
            <p>
                Já possui uma conta?
                <a href="/logar">
                    Fazer login
                </a>
            </p>

        </section>

    </main>

    <script>

        // Guarda o tipo selecionado pelo usuário
        let tipoSelecionado = null;

        // ==========================
        // SELECIONAR TIPO
        // ==========================

        function selecionarTipo(tipo) {

            tipoSelecionado = tipo;

            // 🔧 FIX 5: aria-pressed simplificado — atualiza todos os cards de uma vez
            // antes estava sendo setado em dois lugares separados, duplicando código
            document.querySelectorAll(".tipo-card").forEach(card => {
                card.classList.remove("tipo-card--ativo");
                card.setAttribute("aria-pressed", "false");
            });

            // Marca o card clicado como ativo
            const cardSelecionado = tipo === "responsavel"
                ? document.getElementById("cardResponsavel")
                : document.getElementById("cardPsicologo");

            cardSelecionado.classList.add("tipo-card--ativo");
            cardSelecionado.setAttribute("aria-pressed", "true");

            // 🔧 FIX 2: Habilita o botão ao selecionar um card
            document.getElementById("btnContinuar").disabled = false;

            // 🔧 FIX 1: Esconde a mensagem de erro se estava aparecendo
            const erroSelecao = document.getElementById("erro-selecao");
            erroSelecao.style.display = "none";

        }

        // ==========================
        // CONTINUAR
        // ==========================

        function continuar() {

            // 🔧 FIX 1 + 2: Segurança extra — mesmo com botão desabilitado,
            // valida novamente caso o JS seja chamado diretamente
            if (tipoSelecionado === null) {

                const erroSelecao = document.getElementById("erro-selecao");
                erroSelecao.style.display = "block";
                return;

            }

            // Redireciona para a próxima etapa conforme o tipo escolhido
            if (tipoSelecionado === "responsavel") {
                window.location.href = "/CriarContaG";
            } else if (tipoSelecionado === "psicologo") {
                window.location.href = "/CriarContaP";
            }

        }

    </script>

</body>
</html>
