<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Bixuco — Perfil sensorial
    </title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <link
        rel="stylesheet"
        href="/css/questionariop.css"
    >

</head>

<body>

    <main>

        <!-- lado esquerdo -->

        <section>

            <div>

                <!-- logo -->
                <img
                    src="/img/Logo_Branca.png"
                    alt="Logo Bixuco"
                >

                <!-- titulo -->
                <h1>

                    Acompanhamento
                    <br>

                    infantil
                    <span>inteligente.</span>

                </h1>

                <!-- texto -->
                <p>

                    Mais organização,
                    mais conexão e mais cuidado
                    para famílias e terapeutas.

                </p>

            </div>

            <div>

                <img
                    src="/img/questionario-menino.png"
                    alt="Criança abraçando o Bixuco"
                >

            </div>

        </section>

        <!-- lado direito -->

        <section>

            <header>

                <h2>

                    Perfil sensorial

                </h2>

            </header>

            <div>

                <!-- barra de progresso -->

                <div class="questionario-progresso">

                    <span id="texto-progresso">

                        Pergunta 1 de 10

                    </span>

                    <div
                        class="questionario-progresso__barra"
                        id="barra-progresso"
                    >

                    </div>

                </div>

                <!-- pergunta -->

                <h3
                    id="pergunta-texto"
                >

                    Carregando...

                </h3>

                <!-- alternativas -->

                <form
                    id="form-pergunta"
                >

                    <div
                        id="opcoes"
                    >

                        <!-- preenchido pelo javascript -->

                    </div>

                </form>

                <!-- botão -->

                <button
                    id="btn-proximo"
                    onclick="proximaPergunta()"
                    disabled
                >

                    Próxima pergunta

                </button>

            </div>

        </section>

    </main>

    <script>

        // perguntas

        const perguntas = [

            "Com que frequência sua criança fica incomodada com barulhos altos ou inesperados?",

            "Sua criança evita certas texturas de alimentos ou tecidos?",

            "Ela demonstra sensibilidade excessiva à luz ou movimentos rápidos?",

            "Sua criança procura atividades com bastante movimento, como girar ou pular?",

            "Sua criança se distrai facilmente durante atividades?",

            "Ela se incomoda quando alguém encosta nela inesperadamente?",

            "Sua criança gosta de observar objetos girando ou luzes?",

            "Ela evita lugares muito movimentados ou cheios de pessoas?",

            "Sua criança gosta de cheirar objetos frequentemente?",

            "Ela apresenta dificuldade para dormir devido aos estímulos do ambiente?"

        ];

        // alternativas

        const alternativas = [

            "Sempre",

            "Quase sempre",

            "Raramente",

            "Nunca"

        ];

        let perguntaAtual = 0;

        let respostaSelecionada = null;

        // inicia

        atualizarPergunta();

        atualizarBarra();

        // atualiza pergunta

        function atualizarPergunta(){

            document.getElementById("pergunta-texto").textContent =

                perguntas[perguntaAtual];

            document.getElementById("texto-progresso").textContent =

                `Pergunta ${perguntaAtual + 1} de ${perguntas.length}`;

            const opcoes = document.getElementById("opcoes");

            opcoes.innerHTML = "";

            alternativas.forEach(opcao=>{

                const botao = document.createElement("button");

                botao.type = "button";

                botao.className = "opcao";

                botao.textContent = opcao;

                botao.onclick = ()=>selecionarOpcao(botao,opcao);

                opcoes.appendChild(botao);

            });

            respostaSelecionada = null;

            document.getElementById("btn-proximo").disabled = true;

            if(perguntaAtual === perguntas.length - 1){

                document.getElementById("btn-proximo").textContent =

                    "Finalizar";

            }

            else{

                document.getElementById("btn-proximo").textContent =

                    "Próxima pergunta";

            }

        }

        // seleciona alternativa

        function selecionarOpcao(botao,resposta){

            document.querySelectorAll(".opcao").forEach(op=>{

                op.classList.remove("selecionada");

            });

            botao.classList.add("selecionada");

            respostaSelecionada = resposta;

            document.getElementById("btn-proximo").disabled = false;

        }

        // barra de progresso

        function atualizarBarra(){

            const barra = document.getElementById("barra-progresso");

            barra.innerHTML = "";

            for(let i = 0; i < perguntas.length; i++){

                const ponto = document.createElement("span");

                if(i < perguntaAtual){

                    ponto.className = "ativo";

                }

                else if(i === perguntaAtual){

                    ponto.className = "atual";

                    ponto.textContent = i + 1;

                }

                barra.appendChild(ponto);

            }

        }
        // próxima pergunta

        function proximaPergunta(){

            if(respostaSelecionada == null){

                return;

            }

            // aqui você pode salvar a resposta futuramente

            if(perguntaAtual < perguntas.length - 1){

                perguntaAtual++;

                atualizarPergunta();

                atualizarBarra();

            }

            else{

                window.location.href = "/home";

            }

        }

    </script>

</body>

</html>
