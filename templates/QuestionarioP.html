<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bixuco - Perfil Sensorial</title>
    <!-- icones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --verde-escuro:      #32C26D;
            --verde-claro:       #79D836;
            --azul-claro:        #0AB7FB;
            --azul-escuro:       #1D8EC9;
            --branco:            #F8FAFD;
            --cinza-claro:       #D9D9D9;
            --cinza-escuro:      #5A5A5A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: var(--branco);
            height: 100vh;
            overflow: hidden;
        }

        .pagina-criar-conta {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Lado esquerdo: foto */
        .criar-esquerda {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .criar-esquerda__overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 5;
        }

        .criar-esquerda__foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .criar-esquerda__logo {
            position: absolute;
            width: 70%;
            max-width: 400px;
            z-index: 10;
        }

        /* Lado direito: conteúdo */
        .criar-direita {
            flex: 1;
            background: var(--branco);
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow-y: auto;
        }

        .criar-direita__cabecalho-topo {
            padding: 1.5rem 4.5rem;
            text-align: center;
            border-bottom: 1px solid var(--cinza-claro);
        }

        .criar-direita__titulo {
            font-size: 1.8rem;
            color: var(--cinza-escuro);
            font-weight: 700;
            margin: 0;
        }

        .criar-direita__conteudo {
            padding: 1.5rem 4.5rem;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Barra de progresso - 5 bolas conectadas como enfeite */
        .barra-progresso {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            gap: 0;
        }

        .barra-linha {
            width: 3rem;
            height: 5px;
            background: var(--cinza-claro);
            border-radius: 3px;
            transition: background 0.3s ease;
        }

        .barra-bolinha {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 50%;
            border: 4px solid;
            transition: all 0.3s ease;
            z-index: 2;
        }

        /* Pergunta */
        .pergunta-texto {
            font-size: 1.1rem;
            color: var(--cinza-escuro);
            font-weight: 600;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Opções */
        .opcoes {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .opcao-btn {
            width: 100%;
            padding: 1rem 1.25rem;
            background: white;
            border: 2px solid var(--cinza-claro);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--cinza-escuro);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .opcao-btn:hover {
            border-color: var(--azul-claro);
        }

        .opcao-btn.selecionada {
            border-color: var(--azul-claro);
            background: rgba(10, 183, 251, 0.05);
        }

        /* Botão */
        .btn-submit {
            width: 100%;
            padding: 0.8rem;
            background: white;
            color: black;
            border: 2px solid var(--verde-escuro);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--cinza-claro);
            color: black;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 900px) {
            .pagina-criar-conta {
                flex-direction: column;
            }

            .criar-esquerda {
                height: 30vh;
            }

            .criar-direita__cabecalho-topo,
            .criar-direita__conteudo {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="pagina-criar-conta">

        <!-- Lado esquerdo: foto -->
        <div class="criar-esquerda">
            <img
                class="criar-esquerda__foto"
                src="../static/img/FotoUrso.jpg"
                alt="Criança segurando a pelúcia Bixuco"
            >
            <div class="criar-esquerda__overlay"></div>
            <img
                class="criar-esquerda__logo"
                src="../static/img/Logo_nome.png"
                alt="Logo Bixuco"
            >
        </div>

        <!-- Lado direito: conteúdo -->
        <div class="criar-direita">

            <!-- Título com divisor -->
            <div class="criar-direita__cabecalho-topo">
                <h2 class="criar-direita__titulo">Perfil sensorial</h2>
            </div>

            <div class="criar-direita__conteudo">
                
                <!-- Barra de progresso - 5 bolas conectadas como enfeite -->
                <div class="barra-progresso" id="barra-progresso"></div>

                <!-- Pergunta -->
                <p class="pergunta-texto" id="pergunta-texto">Com que frequência sua criança fica incomodada com barulhos altos ou inesperados?</p>

                <!-- Opções -->
                <div class="opcoes" id="opcoes">
                    <button class="opcao-btn" onclick="selecionarOpcao(this)">Sempre</button>
                    <button class="opcao-btn" onclick="selecionarOpcao(this)">Quase sempre</button>
                    <button class="opcao-btn" onclick="selecionarOpcao(this)">Raramente</button>
                    <button class="opcao-btn" onclick="selecionarOpcao(this)">Nunca</button>
                </div>

                <!-- Botão -->
                <button class="btn-submit" id="btn-proximo" onclick="finalizar()" disabled>
                    Finalizar
                </button>

            </div>

        </div>

    </div>

    <script>
        // Cores oficiais da paleta Bixuco para as bolas
        const coresBolas = [
            "#32C26D", // verde-escuro
            "#79D836", // verde-claro
            "#0AB7FB", // azul-claro
            "#1D8EC9", // azul-escuro
            "#32C26D"  // verde-escuro de novo
        ];

        // Monta a barra com 5 bolas conectadas
        function montarBarra() {
            const barra = document.getElementById("barra-progresso");
            barra.innerHTML = "";

            for (let i = 0; i < 5; i++) {
                // Linha antes da bolinha (exceto na primeira)
                if (i > 0) {
                    const linha = document.createElement("div");
                    linha.className = "barra-linha";
                    linha.style.backgroundColor = coresBolas[i-1];
                    barra.appendChild(linha);
                }

                const bolinha = document.createElement("div");
                bolinha.className = "barra-bolinha";
                bolinha.style.backgroundColor = coresBolas[i];
                bolinha.style.borderColor = coresBolas[i];
                barra.appendChild(bolinha);
            }
        }

        function selecionarOpcao(btnClicado) {
            // Remove seleção anterior
            document.querySelectorAll(".opcao-btn").forEach(b => b.classList.remove("selecionada"));
            btnClicado.classList.add("selecionada");
            
            // Habilita o botão
            document.getElementById("btn-proximo").disabled = false;
        }

        function finalizar() {
            window.location.href = "/home";
        }

        montarBarra();
    </script>

</body>
</html>
