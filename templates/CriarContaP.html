<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Bixuco — Criar conta</title>

    <!-- Biblioteca de ícones -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- CSS da página -->
    <link
        rel="stylesheet"
        href="/css/criarcontap.css"
    >

</head>

<body>

    <main>

        <!-- lado esquerdo -->

        <section>

            <div>

                <!-- Logo branca -->
                <img
                    src="/img/Logo_Branca.png"
                    alt="Logo Bixuco"
                >

                <!-- título -->
                <h1>
                    Crie sua conta
                </h1>

                <!-- texto -->
                <p>
                    Pais e terapeutas juntos pelo
                    bem-estar da criança.
                </p>

            </div>

            <!-- ilustração -->
            <div>

                <img
                    src="/img/familia-bixuco.png"
                    alt="Família utilizando o Bixuco"
                >

            </div>

        </section>


        <!-- lado direito -->

        <section>

            <!-- cabeçalho -->

            <header>

                <h2>
                    Criar conta
                </h2>

            </header>


            <!-- conteúdo -->

            <div>

                <!-- barra de progresso -->

                <div class="cadastro-progresso">

                    <span class="ativo"></span>
                    <span class="ativo"></span>
                    <span></span>

                </div>


                <!-- título -->

                <h3>
                    Informações sobre você
                </h3>


                <!-- formulário -->

                <form

                    action="/continuar-cadastro-psicologo"
                    method="POST"
                    onsubmit="return validarCadastro()"

                >

                    <!-- Nome -->

                    <div>

                        <label
                            for="nome"
                        >
                            Nome completo
                        </label>

                        <input
                            type="text"
                            id="nome"
                            name="nome"
                            placeholder="Digite seu nome completo"
                            autocomplete="name"
                            required
                        >

                        <span
                            id="erro-nome"
                        >
                        </span>

                    </div>

                    <!-- Email -->

                    <div>

                        <label
                            for="email"
                        >
                            Email
                        </label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Digite seu e-mail"
                            autocomplete="email"
                            required
                        >

                        <span
                            id="erro-email"
                        >
                        </span>

                    </div>

                    <!-- linha com telefone e data -->
                    <div>

                        <!-- Telefone -->

                        <div>

                            <label
                                for="telefone"
                            >
                                Telefone (opcional)
                            </label>

                            <input
                                type="tel"
                                id="telefone"
                                name="telefone"
                                placeholder="(00) 00000-0000"
                                autocomplete="tel"
                            >

                            <span
                                id="erro-telefone"
                            >
                            </span>

                        </div>


                        <!-- Data de nascimento -->

                        <div>

                            <label
                                for="dataNascimento"
                            >
                                Data de nascimento
                            </label>

                            <input
                                type="date"
                                id="dataNascimento"
                                name="dataNascimento"
                                required
                            >

                            <span
                                id="erro-dataNascimento"
                            >
                            </span>

                        </div>

                    </div>


                    <!-- CRP -->

                    <div>

                        <label
                            for="crp"
                        >
                            CRP
                        </label>

                        <input
                            type="text"
                            id="crp"
                            name="crp"
                            placeholder="Digite apenas os números"
                            inputmode="numeric"
                            maxlength="10"
                            oninput="this.value = this.value.replace(/\D/g,'')"
                            required
                        >

                        <span
                            id="erro-crp"
                        >
                        </span>

                    </div>


                    <!-- botão -->

                    <button
                        type="submit"
                        href="/CriarContaSenha"
                    >
                        Continuar
                    </button>

                </form>


                <!-- termos -->

                <p>

                    Ao criar sua conta você concorda com nossos

                    <a href="/termos">
                        Termos de uso
                    </a>

                    e

                    <a href="/privacidade">
                        Política de privacidade.
                    </a>

                </p>

            </div>

        </section>

    </main>

    <script>

        // máscara do telefone
        document.getElementById("telefone").addEventListener("input", function(){

            let valor = this.value.replace(/\D/g,"").slice(0,11);

            if(valor.length > 10){
                valor = valor.replace(
                    /(\d{2})(\d{5})(\d{4})/,
                    "($1) $2-$3"
                );
            }
            else if(valor.length > 6){
                valor = valor.replace(
                    /(\d{2})(\d{4})(\d+)/,
                    "($1) $2-$3"
                );
            }
            else if(valor.length > 2){
                valor = valor.replace(
                    /(\d{2})(\d+)/,
                    "($1) $2"
                );
            }

            this.value = valor;

        });


        // mostra erro
        function mostrarErro(inputId,erroId,mensagem){

            const input = document.getElementById(inputId);
            const erro = document.getElementById(erroId);

            input.classList.add("input-erro");
            erro.textContent = mensagem;
            erro.style.display = "block";

            setTimeout(()=>{
                input.classList.remove("input-erro");
            },500);

        }


        // limpa os erros
        function limparErros(){

            [
                "nome",
                "email",
                "telefone",
                "dataNascimento",
                "crp"
            ].forEach(id=>{

                const campo = document.getElementById(id);
                const erro = document.getElementById("erro-"+id);

                if(campo){
                    campo.classList.remove("input-erro");
                }

                if(erro){
                    erro.style.display = "none";
                    erro.textContent = "";
                }

            });

        }


        // verifica se possui 18 anos
        function maiorIdade(data){

            const hoje = new Date();
            const nascimento = new Date(data);

            let idade = hoje.getFullYear() - nascimento.getFullYear();

            const mes = hoje.getMonth() - nascimento.getMonth();

            if(
                mes < 0 ||
                (mes === 0 && hoje.getDate() < nascimento.getDate())
            ){
                idade--;
            }

            return idade >= 18;

        }


        // valida formulário
        function validarCadastro(){

            limparErros();

            let valido = true;

            const nome = document.getElementById("nome").value.trim();
            const email = document.getElementById("email").value.trim();
            const telefone = document.getElementById("telefone").value.trim();
            const data = document.getElementById("dataNascimento").value;
            const crp = document.getElementById("crp").value.trim();

            const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if(nome.split(" ").filter(p=>p).length < 2){

                mostrarErro(
                    "nome",
                    "erro-nome",
                    "Digite seu nome completo."
                );

                valido = false;

            }


            if(!regexEmail.test(email)){

                mostrarErro(
                    "email",
                    "erro-email",
                    "Digite um e-mail válido."
                );

                valido = false;

            }


            if(
                telefone &&
                telefone.replace(/\D/g,"").length < 10
            ){

                mostrarErro(
                    "telefone",
                    "erro-telefone",
                    "Telefone inválido."
                );

                valido = false;

            }


            if(!data){

                mostrarErro(
                    "dataNascimento",
                    "erro-dataNascimento",
                    "Informe sua data de nascimento."
                );

                valido = false;

            }
            else if(!maiorIdade(data)){

                mostrarErro(
                    "dataNascimento",
                    "erro-dataNascimento",
                    "Você precisa ter pelo menos 18 anos."
                );

                valido = false;

            }


            if(!/^\d+$/.test(crp)){

                mostrarErro(
                    "crp",
                    "erro-crp",
                    "Digite apenas números."
                );

                valido = false;

            }

            return valido;

        }


        // mensagens vindas do servidor

        const mensagensServidor = {

            "crp-invalido":{
                campo:"crp",
                msg:"CRP inválido."
            },

            "email-invalido":{
                campo:"email",
                msg:"Email inválido."
            },

            "ja-cadastrado":{
                campo:"email",
                msg:"Este e-mail já está cadastrado."
            },

            "erro-interno":{
                campo:"nome",
                msg:"Ocorreu um erro. Tente novamente."
            }

        };


        const params = new URLSearchParams(window.location.search);

        const erro = params.get("erro");

        if(
            erro &&
            mensagensServidor[erro]
        ){

            mostrarErro(
                mensagensServidor[erro].campo,
                "erro-"+mensagensServidor[erro].campo,
                mensagensServidor[erro].msg
            );

        }

    </script>

</body>
</html>
