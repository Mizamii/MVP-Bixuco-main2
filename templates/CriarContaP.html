<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Psicólogo</title>

    <style>
        .logo {
            margin-right: 60px;
            margin-left: 40px;
            height: 75px;
        }
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .texto {
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .titulomed {
            font-family: 'Inter', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 0px;
            text-align: center;
        }
        .subtitulo-topo {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 400;
            margin-top: 0px;
            margin-bottom: 30px;
            text-align: center;
        }
        .subtitulo {
            font-family: 'Inter', sans-serif;
            width: 440px;
            font-size: 18px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 5px;
        }
        input {
            width: 400px;
            height: 50px;
            background-color: #79D836;
            border: none;
            border-radius: 15px;
            padding: 0 20px;
            margin-bottom: 15px;
            color: white;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        .btn {
            width: 440px;
            height: 60px;
            background-color: #0AB7FB;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #1D8EC9;
            transform: scale(1.0);
            transition: all 0.3s ease;
        }
        .rodape {
            background-color: #1D8EC9;
            color: white;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 0 auto;
            overflow-x: hidden;
            gap: 105px;
            margin-top: auto;
        }
        .rodape p {
            margin: 0;
        }
        .texto form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input[readonly] {
            background-color: #79D836;
            opacity: 0.8;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <img class="logo" src="/img/Logo_nome.png" alt="Bixuco Logo">
    </header>

    <div class="texto">
        <h1 class="titulomed">Bem-vindo</h1>
        <h2 class="subtitulo-topo">Criar conta</h2>

        <form action="/cadastro-psicologo" method="POST" onsubmit="return validarCadastro()">
            
            <p class="subtitulo">Email ou telefone</p>
            <input type="email" id="email" placeholder="email@exemplo.com" name="email" required>

            <p class="subtitulo">Nome Completo</p>
            <input type="text" id="nome_completo" placeholder="Nome completo" name="nome" required>

            <p class="subtitulo">CRP</p>
            <input type="text" name="crp" id="crp" placeholder="Digite apenas números" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>

            <p class="subtitulo">Senha</p>
            <input type="password" id="senha" minlength="6" name="senha" required>

            <p class="subtitulo">Confirmar senha</p>
            <input type="password" id="senhaConfirmar" minlength="6" required>

            <p class="subtitulo">Data de nascimento</p>
            <input type="date" id="dataNascimento" name="dataNascimento" required>

            <p class="subtitulo">CEP</p>
            <input type="text" id="cep" name="cep" placeholder="Digite seu CEP" maxlength="8" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, ''); if(this.value.length === 8) buscarCep(this.value)" required>

            <p class="subtitulo">Cidade</p>
            <input type="text" id="cidade" name="cidade" placeholder="Preenchido automaticamente" readonly>

            <p class="subtitulo">Estado</p>
            <input type="text" id="estado" name="estado" placeholder="Preenchido automaticamente" readonly>

            <p class="subtitulo">Bairro</p>
            <input type="text" id="bairro" name="bairro" placeholder="Preenchido automaticamente" readonly>

            <button class="btn" type="submit" required >Criar conta</button>
        </form>
    </div>
    
    <footer class="rodape">
        <p>Política de privacidade</p>
        <span>|</span>
        <p>Termos de uso</p>
        <span>|</span>
        <p>Sobre nós</p>
    </footer>
    <script>
        async function buscarCep(cep) {
            try {
                const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await res.json();

                if (data.erro) {
                    alert("CEP não encontrado!");
                    return;
                }

                document.getElementById("cidade").value = data.localidade;
                document.getElementById("estado").value = data.uf;
                document.getElementById("bairro").value = data.bairro;

            } catch (err) {
                alert("Erro ao buscar CEP. Tente novamente.");
            }
        }
        function validarCadastro(){
            const email = document.getElementById("email").value.trim();
            const senha = document.getElementById("senha").value;
            const confirmar = document.getElementById("senhaConfirmar").value;
            const crp = document.getElementById("crp").value.trim();
            const dataNascimento = document.getElementById("dataNascimento").value;

            if (senha != confirmar){
                alert("As senhas não coincidem!");
                return false;
            }

            if (senha.length < 6){
                alert("A senha deve ter pelo menos 6 caracteres!");
                return false;
            }

            if (!/\S+@\S+\.\S+/.test(email)){
                alert("Email inválido!");
                return false;
            }

            // Validação do CRP: deve conter apenas números
            const regexCRP = /^\d+$/;
            if (!regexCRP.test(crp)){
                alert("CRP inválido! Digite apenas os números.");
                return false;
            }

            if (!maiorIdade(dataNascimento)){
                alert("Você precisa ter pelo menos 18 anos.");
                return false;
            }

            // Se chegou até aqui, os dados estão válidos
            return true; // Retornamos false para evitar que o formulário tente recarregar a página antes de redirecionar
        }

        function maiorIdade(data){
            const hoje = new Date();
            const nasc = new Date(data);

            let idade = hoje.getFullYear() - nasc.getFullYear(); 
            const mes = hoje.getMonth() - nasc.getMonth(); 
            
            if (mes < 0 || (mes === 0 && hoje.getDate() < nasc.getDate())){
                idade--; 
            }

            return idade >= 18;
        }
    </script>

</body>
</html>
