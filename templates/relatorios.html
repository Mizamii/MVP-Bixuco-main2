<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Bixuco - Relatórios</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <link
        rel="stylesheet"
        href="/css/relatorios.css"
    >

</head>

<body>

    <div class="container">

        <!-- ========================= -->
        <!-- MENU -->
        <!-- ========================= -->

        <aside class="sidebar">

            <div class="logo">

                <img
                    src="/img/Logo_Colorida.png"
                    alt="Bixuco"
                >

            </div>

            <nav>

                <a href="/home">

                    <i class="fa-solid fa-house"></i>

                    <span>Início</span>

                </a>

                <a
                    href="/relatorios"
                    class="ativo"
                >

                    <i class="fa-solid fa-chart-line"></i>

                    <span>Relatórios</span>

                </a>

                <a href="/Configuracoes">

                    <i class="fa-solid fa-gear"></i>

                    <span>Configurações</span>

                </a>

                <a href="/Sobre">

                    <i class="fa-solid fa-circle-info"></i>

                    <span>Sobre</span>

                </a>

            </nav>

            <button
                class="btn-relatorio"
                onclick="location.href='/relatorio'"
            >

                Relatório diário

            </button>

            <div class="tema">

                <button class="ativo">

                    <i class="fa-regular fa-sun"></i>

                    Claro

                </button>

                <button>

                    <i class="fa-regular fa-moon"></i>

                    Escuro

                </button>

            </div>

            <a
                href="/logout"
                class="logout"
            >

                <i class="fa-solid fa-arrow-right-from-bracket"></i>

                <span>Sair</span>

            </a>

        </aside>

        <!-- ========================= -->
        <!-- CONTEÚDO -->
        <!-- ========================= -->

        <main class="conteudo">

            <header class="topo">

                <button class="tradutor">

                    <i class="fa-solid fa-language"></i>

                    Traduzir para inglês

                </button>

                <div class="usuario">

                    <button class="notificacao">

                        <i class="fa-regular fa-bell"></i>

                    </button>

                    <img

                        id="fotoUsuario"

                        src="/img/perfilPadrao.png"

                        alt="Perfil"

                    >

                    <div>

                        <h3 id="nomeUsuario">

                            Carregando...

                        </h3>

                        <span id="tipoConta">

                            ...

                        </span>

                    </div>

                </div>

            </header>

            <!-- Cabeçalho -->

            <section class="cabecalho">

                <div>

                    <h1>

                        Relatórios

                    </h1>

                    <div class="abas">

                        <button
                            id="btnVisao"
                            class="ativa"
                        >

                            Visão geral

                        </button>

                        <button
                            id="btnDiario"
                        >

                            Diário

                        </button>

                    </div>

                </div>

                <img
                    src="/img/BixucoRelatorio.png"
                    alt="Mascote"
                >

            </section>
            <!-- ================================= -->
            <!-- VISÃO GERAL -->
            <!-- ================================= -->

            <section
                id="abaVisao"
                class="aba-conteudo ativa"
            >

                <!-- Cards -->

                <div class="cards-relatorio">

                    <div class="card">

                        <h3>

                            Alertas de estresse

                        </h3>

                        <span
                            id="alertasEstresse"
                        >

                            0

                        </span>

                        <p>

                            registrados este mês

                        </p>

                    </div>

                    <div class="card">

                        <h3>

                            Tempo médio de estresse

                        </h3>

                        <span
                            id="tempoEstresse"
                        >

                            0 min

                        </span>

                        <p>

                            por episódio

                        </p>

                    </div>

                </div>

                <!-- Linha 1 -->

                <div class="linha-graficos">

                    <div class="grafico-card">

                        <h2>

                            Humor da criança

                        </h2>

                        <canvas
                            id="graficoHumor"
                        ></canvas>

                    </div>

                    <div class="grafico-card">

                        <h2>

                            Qualidade do sono

                        </h2>

                        <canvas
                            id="graficoSono"
                        ></canvas>

                    </div>

                </div>

                <!-- Linha 2 -->

                <div class="linha-graficos">

                    <div class="grafico-card grande">

                        <h2>

                            Evolução semanal

                        </h2>

                        <canvas
                            id="graficoSemanal"
                        ></canvas>

                    </div>

                </div>

            </section>


            <!-- ================================= -->
            <!-- ABA DIÁRIO -->
            <!-- ================================= -->

            <section
                id="abaDiario"
                class="aba-conteudo"
            >

                <div class="relatorio-diario">

                    <div class="topo-diario">

                        <div>

                            <h2>

                                Relatório diário

                            </h2>

                            <p
                                id="dataRelatorio"
                            >

                                Carregando...

                            </p>

                        </div>

                    </div>

                    <div
                        id="listaPerguntas"
                        class="lista-perguntas"
                    >

                        <!--
                            O JavaScript vai colocar
                            perguntas e respostas aqui
                        -->

                    </div>

                </div>

            </section>

        </main>

    </div>
    <script>

        // ==========================
        // Alternar entre as abas
        // ==========================

        const btnVisao = document.getElementById("btnVisao");
        const btnDiario = document.getElementById("btnDiario");

        const abaVisao = document.getElementById("abaVisao");
        const abaDiario = document.getElementById("abaDiario");

        btnVisao.addEventListener("click", () => {

            btnVisao.classList.add("ativa");
            btnDiario.classList.remove("ativa");

            abaVisao.style.display = "block";
            abaDiario.style.display = "none";

        });

        btnDiario.addEventListener("click", () => {

            btnDiario.classList.add("ativa");
            btnVisao.classList.remove("ativa");

            abaVisao.style.display = "none";
            abaDiario.style.display = "block";

        });

        // ==========================
        // Dados do usuário
        // ==========================

        async function carregarUsuario(){

            try{

                const resposta = await fetch("/usuario");

                if(!resposta.ok) return;

                const usuario = await resposta.json();

                document.getElementById("nomeUsuario").textContent =
                    usuario.nome;

                document.getElementById("tipoConta").textContent =
                    usuario.tipo;

                if(usuario.foto){

                    document.getElementById("fotoUsuario").src =
                        usuario.foto;

                }

            }

            catch(e){

                console.log(e);

            }

        }

        // ==========================
        // Último relatório
        // ==========================

        async function carregarRelatorio(){

            try{

                const resposta = await fetch("/ultimo-relatorio");

                if(!resposta.ok){

                    return;

                }

                const relatorio = await resposta.json();

                document.getElementById("alertasEstresse").textContent =
                    relatorio.alertas ?? 0;

                document.getElementById("tempoEstresse").textContent =
                    relatorio.tempo ?? "0 min";

                document.getElementById("dataRelatorio").textContent =
                    relatorio.data ?? "Nenhum relatório encontrado.";

                const lista =
                    document.getElementById("listaPerguntas");

                lista.innerHTML = "";

                relatorio.perguntas.forEach(item=>{

                    lista.innerHTML += `

                    <div class="pergunta">

                        <div>

                            <h3>${item.pergunta}</h3>

                            <p>${item.resposta}</p>

                        </div>

                    </div>

                    `;

                });

            }

            catch(e){

                console.log(e);

            }

        }

        // ==========================
        // Tema
        // ==========================

        document.getElementById("temaClaro")
        ?.addEventListener("click",()=>{

            document.body.classList.remove("dark");

        });

        document.getElementById("temaEscuro")
        ?.addEventListener("click",()=>{

            document.body.classList.add("dark");

        });

        // ==========================
        // Inicialização
        // ==========================

        abaDiario.style.display = "none";

        carregarUsuario();

        carregarRelatorio();

    </script>

</body>

</html>
