<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logar</title>
    <style>
        .logo{
        margin-right: 60px;
        margin-left: 40px;
        height: 75px;   
        }
        body {
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh; 
        margin: 0;
        }
        .texto {
        font-family: 'Inter', sans-serif; 
        margin-top: 100px;
        margin-left: 200px;
        margin-right: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: left;
        }
        .titulodest {
        font-family: 'Inter', sans-serif; 
        font-size: 36px;               
        font-weight: 700;                 
        }
        input[type="email"], 
        input[type="password"] {
        width: 400px;         
        height: 50px;
        background-color: #79D836; 
        border: none;
        border-radius: 15px;  
        padding: 0 20px;
        margin-bottom: 20px;
        color: white;   
        border: none;
        outline: none; 
        }
        .subtitulo {
        font-family: 'Inter', sans-serif; 
        width: 400px;           
        text-align: left;       
        font-size: 18px;  
        margin-bottom: 5px;
        display: flex;
        align-items: baseline; 
        justify-content: flex-start;
        width: 75%;                         
        margin-bottom: 5px;

        } 
        .senha-container {
        display: flex;  
        text-align: right;         
        align-items: baseline;  
        width: 100%;                         
        margin-bottom: 5px;     
}
   
        .esqueci-senha {
        font-size: 14px;
        display: flex;
        justify-content: flex-end;
        white-space: nowrap;
        color: #757575;        
        cursor: pointer;
        margin: 0;
        }

        .esqueci-senha:hover {
        text-decoration: underline; 
        }            
        
        .rodape{
            background-color: #1D8EC9;
            color: white;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 0 auto;
            overflow-x: hidden;
            gap: 105px;
            margin-top: auto;
        }
        .btn {
            width: 440px;
            height: 60px;
            background-color: #0AB7FB;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            
        }
        .btn:hover {
            background-color: #1D8EC9;
            cursor: pointer;
            transform: scale(1.0);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <header>
        <img class="logo" src="../static/img/Logo_nome.png" alt="">
    </header>
    <div class="texto">
        <h1 class="titulodest">Bem-vindo de volta</h1>
        <form action="/login" method="post">

            
            <p class="subtitulo">Digite seu e-mail:</p>
            
            <input class="campo-input" type="email" placeholder="email@exemplo.com">
            <br>
            <div class="senha-container">
            <p class="subtitulo">Digite sua senha:</p>
            <p class="esqueci-senha" onclick="window.location.href='EsqueceuSenha.html'">Esqueci minha senha</p>
            </div>
            <input class="campo-input" type="password" placeholder="Senha">
            
            <br>
            <button class="btn" type="submit" onclick="window.location.href='home.html'" required >Entrar</button>

        </form>
        
    </div>
    
    <footer class="rodape">
    <p>Política de privacidade</p>
    <span>|</span>
    <p>Termos de uso</p>
    <span>|</span>
    <p>Sobre nós</p>
</footer>
</body>
</html>
