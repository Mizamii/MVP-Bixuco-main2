<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Bixuco — Adicionar criança
    </title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <link
        rel="stylesheet"
        href="/css/adicionarc.css"
    >

</head>

<body>

    <main>

        <!-- lado esquerdo -->

        <section>

            <div>

                <!-- logo branca -->

                <img
                    src="/img/Logo_Branca.png"
                    alt="Logo Bixuco"
                >

                <!-- titulo -->

                <h1>

                    Acompanhamento
                    <br>
                    infantil
                    <span>inteligente</span>

                </h1>

                <!-- texto -->

                <p>

                    Mais organização,
                    mais conexão e
                    mais cuidado para
                    famílias e terapeutas.

                </p>

            </div>

            <div>

                <!-- ilustração -->

                <img
                    src="/img/criancas-bixuco.png"
                    alt="Crianças com o Bixuco"
                >

            </div>

        </section>

        <!-- lado direito -->

        <section>

            <header>

                <h2>

                    Adicionar criança

                </h2>

            </header>

            <div>

                <!-- titulo -->

                <h3>

                    Adicionar criança

                </h3>

                <!-- descricao -->

                <p>

                    Cadastre o(a) filho(a)
                    que você vai acompanhar.

                </p>

                <!-- formulario -->

                <form

                    action="/adicionar-crianca"
                    method="POST"
                    enctype="multipart/form-data"
                    onsubmit="return validarCadastro()"

                >

                    <!-- foto da criança -->

                    <div
                        onclick="document.getElementById('fotoCrianca').click()"
                    >

                        <img
                            id="preverafoto"
                            src=""
                            alt="Foto da criança"
                            style="display:none"
                        >

                        <i
                            id="icone-camera"
                        ></i>

                        <input
                            type="file"
                            id="fotoCrianca"
                            name="fotoCrianca"
                            accept="image/*"
                            style="display:none"
                            onchange="previewFoto(this)"
                        >

                    </div>

                    <!-- nome -->

                    <div>

                        <label
                            for="nomeCrianca"
                        >

                            Nome da criança

                        </label>

                        <input

                            type="text"
                            id="nomeCrianca"
                            name="nomeCrianca"
                            placeholder="Digite o nome da criança"
                            autocomplete="off"
                            required

                        >

                        <span
                            id="erro-nomeCrianca"
                        >

                        </span>

                    </div>
                    <!-- linha com data e sexo -->

                    <div>

                        <!-- data de nascimento -->

                        <div>

                            <label
                                for="dataNascimento"
                            >

                                Data de nascimento

                            </label>

                            <input

                                type="date"
                                id="dataNascimento"
                                name="dataNascimento"
                                required

                            >

                            <span
                                id="erro-dataNascimento"
                            >

                            </span>

                        </div>

                        <!-- sexo -->

                        <div>

                            <label
                                for="sexo"
                            >

                                Sexo

                            </label>

                            <select

                                id="sexo"
                                name="sexo"
                                required

                            >

                                <option
                                    value=""
                                    selected
                                    disabled
                                >
                                    Selecione
                                </option>

                                <option
                                    value="masculino"
                                >
                                    Masculino
                                </option>

                                <option
                                    value="feminino"
                                >
                                    Feminino
                                </option>

                                <option
                                    value="outro"
                                >
                                    Prefiro não informar
                                </option>

                            </select>

                            <span

                                id="erro-sexo"

                            >

                            </span>

                        </div>

                    </div>

                    <!-- nome da pelucia -->

                    <div>

                        <label
                            for="nomePelucia"
                        >

                            Nome da pelúcia (opcional)

                        </label>

                        <input

                            type="text"
                            id="nomePelucia"
                            name="nomePelucia"
                            placeholder="Ex: Bixuco"

                        >

                    </div>

                    <!-- botao -->

                    <button
                        type="submit"
                    >

                        Ir para o Perfil sensorial

                    </button>

                </form>

            </div>

        </section>

    </main>

    <script>

        // mostra a prévia da foto escolhida
        function previewFoto(input){

            const preview = document.getElementById("preverafoto");
            const icone = document.getElementById("icone-camera");

            if(
                input.files &&
                input.files[0]
            ){

                const reader = new FileReader();

                reader.onload = function(e){

                    preview.src = e.target.result;
                    preview.style.display = "block";
                    icone.style.display = "none";

                };

                reader.readAsDataURL(input.files[0]);

            }

        }

        // mostra mensagem de erro
        function mostrarErro(inputId,erroId,mensagem){

            const input = document.getElementById(inputId);
            const erro = document.getElementById(erroId);

            input.classList.add("input-erro");
            erro.textContent = mensagem;
            erro.style.display = "block";

            setTimeout(()=>{

                input.classList.remove("input-erro");

            },500);

        }

        // limpa erros
        function limparErros(){

            [
                "nomeCrianca",
                "dataNascimento",
                "sexo"
            ].forEach(id=>{

                const campo = document.getElementById(id);
                const erro = document.getElementById("erro-"+id);

                if(campo){

                    campo.classList.remove("input-erro");

                }

                if(erro){

                    erro.style.display = "none";
                    erro.textContent = "";

                }

            });

        }

        // verifica se a data é futura
        function dataNoFuturo(data){

            return new Date(data) > new Date();

        }

        // valida formulario
        function validarCadastro(){

            limparErros();

            let valido = true;

            const nome = document
                .getElementById("nomeCrianca")
                .value
                .trim();

            const data = document
                .getElementById("dataNascimento")
                .value;

            const sexo = document
                .getElementById("sexo")
                .value;

            if(nome.length < 2){

                mostrarErro(
                    "nomeCrianca",
                    "erro-nomeCrianca",
                    "Digite o nome da criança."
                );

                valido = false;

            }

            if(!data){

                mostrarErro(
                    "dataNascimento",
                    "erro-dataNascimento",
                    "Informe a data de nascimento."
                );

                valido = false;

            }
            else if(dataNoFuturo(data)){

                mostrarErro(
                    "dataNascimento",
                    "erro-dataNascimento",
                    "A data não pode ser no futuro."
                );

                valido = false;

            }

            if(!sexo){

                mostrarErro(
                    "sexo",
                    "erro-sexo",
                    "Selecione o sexo."
                );

                valido = false;

            }

            return valido;

        }

        // mensagens vindas do servidor

        const mensagensServidor = {

            "crianca-existente":{

                campo:"nomeCrianca",
                msg:"Essa criança já foi cadastrada."

            },

            "erro-interno":{

                campo:"nomeCrianca",
                msg:"Ocorreu um erro. Tente novamente."

            }

        };

        const params = new URLSearchParams(window.location.search);

        const erro = params.get("erro");

        if(
            erro &&
            mensagensServidor[erro]
        ){

            mostrarErro(

                mensagensServidor[erro].campo,
                "erro-"+mensagensServidor[erro].campo,
                mensagensServidor[erro].msg

            );

        }

    </script>

</body>

</html>
